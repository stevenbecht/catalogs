apiVersion: suse.ai/v1alpha1
kind: Blueprint
metadata:
  name: assistant-starter
spec:
  displayName: Assistant Starter
  description: Cohesive assistant environment that wires Open WebUI to an Ollama runtime.
  category: AI Application
  support: Community
  modules:
    - moduleRef: ollama
      displayName: Ollama
      description: Local model runtime consumed by the assistant UI.
      category: Serving
      source:
        git:
          url: https://github.com/otwld/ollama-helm
          ref: ollama-1.42.0
          path: .
      targetNamespace: ollama
      images:
        - name: ollama
          image: ollama/ollama:0.15.6
    - moduleRef: open-webui
      displayName: Open WebUI
      description: Assistant UI configured to consume the Ollama module from this blueprint.
      category: AI Application
      source:
        git:
          url: https://github.com/open-webui/helm-charts
          ref: open-webui-10.2.1
          path: charts/open-webui
      targetNamespace: open-webui
      dependsOn:
        - ollama
      values:
        nameOverride: "${suse.deployment.name}-open-webui"
        ollama:
          enabled: false
        ollamaUrls:
          - "http://${suse.deployment.name}-ollama.ollama.svc.cluster.local:11434"
        pipelines:
          enabled: false
        serviceAccount:
          name: "${suse.deployment.name}-open-webui"
        websocket:
          url: "redis://${suse.deployment.name}-open-webui-redis:6379/0"
          redis:
            name: "${suse.deployment.name}-open-webui-redis"
      images:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:0.7.2
        - name: redis
          image: redis:7.4.2-alpine3.21
